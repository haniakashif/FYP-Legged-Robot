controller_manager:
  ros__parameters:
    update_rate: 1000
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    imu_broadcaster:
      type: imu_sensor_broadcaster/IMUSensorBroadcaster

    forward_effort_controller:
      type: effort_controllers/JointGroupEffortController

imu_broadcaster:
  ros__parameters:
    sensor_name: "imu_sensor"
    frame_id: "base_link"

forward_effort_controller:
  ros__parameters:
    joints:
      - fl_hip_joint
      - fl_knee_joint
      - fl_foot_joint
      - fr_hip_joint
      - fr_knee_joint
      - fr_foot_joint
      - bl_hip_joint
      - bl_knee_joint
      - bl_foot_joint
      - br_hip_joint
      - br_knee_joint
      - br_foot_joint
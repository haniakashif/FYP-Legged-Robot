elevation_mapping:
  ros__parameters:
    map_frame_id: "animated_rgbd_camera/link/rgbd_camera"
    robot_base_frame_id: "animated_rgbd_camera/link/rgbd_camera"
    track_point_frame_id: "animated_rgbd_camera/link/rgbd_camera"
    use_tf_robot_pose: false
    track_robot_with_tf: false
    length_in_x: 4.0
    length_in_y: 4.0
    resolution: 0.05
    min_variance: 0.001
    max_variance: 0.05
    robot_pose_with_covariance_topic: ""
    robot_odom_topic: ""
    time_tolerance: 1.0
    # Cleanup old cells aggressively
    enable_visibility_cleanup: true
    visibility_cleanup_rate: 1.0   # run cleanup every 1 second
    scanning_duration: 0.5         # cells older than 0.5s get cleared
    enable_continuous_cleanup: true
    input_sources: ["ceiling_lidar"]
    ceiling_lidar:
      type: pointcloud
      topic: /ceiling_points_flipped
      queue_size: 10
      publish_on_update: true
      sensor_processor:
        type: perfect

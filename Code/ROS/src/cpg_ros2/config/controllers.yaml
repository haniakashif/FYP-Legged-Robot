controller_manager:
  ros__parameters:
    update_rate: 100  

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_group_position_controller:
      type: position_controllers/JointGroupPositionController

joint_group_position_controller:
  ros__parameters:
    # List the joints here in the same order the policy outputs them so it automatically routes Index 0 to bl_hip, Index 1 to br_hip, etc.
    joints:
      - bl_hip_joint
      - br_hip_joint
      - fl_hip_joint
      - fr_hip_joint
      - bl_knee_joint
      - br_knee_joint
      - fl_knee_joint
      - fr_knee_joint
      - bl_foot_joint
      - br_foot_joint
      - fl_foot_joint
      - fr_foot_joint
    
    interface_name: position